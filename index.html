<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>4LMNC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: sans-serif;
    font-size: 13px;
    background: #fff;
    color: #000;
    height: 100vh;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }

  /* ── sidebar ── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    border-right: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width .15s, min-width .15s;
  }
  #sidebar.collapsed {
    width: 0;
    min-width: 0;
    border-right: none;
  }
  #sidebar-header {
    padding: 8px 10px;
    border-bottom: 1px solid #ccc;
    font-weight: bold;
    font-size: 12px;
    color: #555;
    letter-spacing: .04em;
    text-transform: uppercase;
    user-select: none;
    white-space: nowrap;
  }
  #tree {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .folder { user-select: none; }
  .folder-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    cursor: pointer;
    font-weight: bold;
    color: #333;
    white-space: nowrap;
  }
  .folder-row:hover { background: #f0f0f0; }
  .folder-arrow {
    font-size: 10px;
    width: 10px;
    display: inline-block;
    transition: transform .12s;
  }
  .folder.open > .folder-row .folder-arrow { transform: rotate(90deg); }
  .folder-children { display: none; }
  .folder.open > .folder-children { display: block; }
  .file-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 28px;
    cursor: pointer;
    color: #444;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-row:hover { background: #f0f0f0; }
  .file-row.active { background: #000; color: #fff; }

  /* ── main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  #stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  canvas { max-width: 100%; max-height: 100%; display: block; }
  #loading { position: absolute; color: #555; }

  /* ── nav bar ── */
  #nav {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    border-top: 1px solid #ccc;
    flex-shrink: 0;
  }
  button {
    font-size: 13px;
    border: 1px solid #aaa;
    background: #fff;
    padding: 3px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #eee; }
  button:disabled { color: #bbb; cursor: default; background: #fff; }
  button.on { background: #000; color: #fff; border-color: #000; }
  #btn-tree { font-size: 15px; padding: 3px 8px; }
  #page-info { min-width: 60px; text-align: center; }
  #sep { color: #ccc; }
  input[type=range] { width: 90px; cursor: pointer; }
  #fps-val { min-width: 38px; }
  #file-label {
    margin-left: auto;
    color: #999;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 300px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">Fichiers</div>
  <div id="tree"><em style="padding:8px 12px;display:block;color:#aaa">…</em></div>
</div>

<div id="main">
  <div id="stage">
    <div id="loading"></div>
    <canvas id="cv" style="display:none"></canvas>
  </div>
  <div id="nav">
    <button id="btn-tree" title="Fichiers">☰</button>
    <button id="btn-prev" disabled>&#8592;</button>
    <button id="btn-next" disabled>&#8594;</button>
    <span id="page-info">— / —</span>
    <span id="sep">|</span>
    <button id="btn-play" disabled>&#9654;</button>
    <input type="range" id="fps-slider" min="1" max="30" value="8" disabled>
    <span id="fps-val">8</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── sidebar toggle ──────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
document.getElementById('btn-tree').onclick = () =>
  sidebar.classList.toggle('collapsed');

// ── build tree from files.json ──────────────────────────────────────────────
const treeEl = document.getElementById('tree');

async function buildTree() {
  let manifest;
  try {
    const res = await fetch('files.json');
    if (!res.ok) throw new Error(res.status);
    manifest = await res.json();
  } catch(e) {
    treeEl.innerHTML = '<em style="padding:8px 12px;display:block;color:#c00">files.json manquant</em>';
    return;
  }

  treeEl.innerHTML = '';
  for (const [folder, files] of Object.entries(manifest)) {
    if (!files.length) continue;

    const folderDiv = document.createElement('div');
    folderDiv.className = 'folder open';

    const row = document.createElement('div');
    row.className = 'folder-row';
    row.innerHTML = `<span class="folder-arrow">▶</span>📁 ${folder}`;
    row.onclick = () => folderDiv.classList.toggle('open');

    const children = document.createElement('div');
    children.className = 'folder-children';

    for (const filename of files) {
      const path  = `${folder}/${filename}`;
      const label = filename.replace(/\.pdf$/i, '');

      const fileRow = document.createElement('div');
      fileRow.className = 'file-row';
      fileRow.textContent = label;
      fileRow.title = path;
      fileRow.onclick = () => {
        document.querySelectorAll('.file-row.active').forEach(r => r.classList.remove('active'));
        fileRow.classList.add('active');
        loadPDF(path);
      };
      children.appendChild(fileRow);
    }

    folderDiv.appendChild(row);
    folderDiv.appendChild(children);
    treeEl.appendChild(folderDiv);
  }
}

buildTree();

// ── PDF viewer ──────────────────────────────────────────────────────────────
let pages = [], current = 0, playing = false, playTimer = null, loadController = null;

const cv      = document.getElementById('cv');
const ctx     = cv.getContext('2d');
const loading = document.getElementById('loading');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnPlay = document.getElementById('btn-play');
const pgInfo  = document.getElementById('page-info');
const slider  = document.getElementById('fps-slider');
const fpsVal  = document.getElementById('fps-val');

slider.oninput = () => { fpsVal.textContent = slider.value; };

const BATCH = 8;

async function loadPDF(path) {
  stopPlay();
  pages = []; current = 0;
  cv.style.display = 'none';
  loading.textContent = '…';
  loading.style.display = 'block';
  setNav(false);

  if (loadController) loadController.abort();
  loadController = new AbortController();
  const signal = loadController.signal;

  let pdf;
  try {
    pdf = await pdfjsLib.getDocument(path).promise;
  } catch(e) {
    loading.textContent = `introuvable : ${path}`;
    return;
  }

  const n      = pdf.numPages;
  const scale  = window.devicePixelRatio * 1.5;
  const result = new Array(n);

  for (let start = 0; start < n; start += BATCH) {
    if (signal.aborted) return;
    const end = Math.min(start + BATCH, n);
    await Promise.all(
      Array.from({ length: end - start }, async (_, j) => {
        const i    = start + j;
        const page = await pdf.getPage(i + 1);
        const vp   = page.getViewport({ scale });
        const off  = new OffscreenCanvas(vp.width, vp.height);
        await page.render({ canvasContext: off.getContext('2d'), viewport: vp }).promise;
        result[i]  = await createImageBitmap(off);
      })
    );
    if (start === 0 && !signal.aborted) {
      pages = result.slice(0, end);
      loading.style.display = 'none';
      cv.style.display = 'block';
      showPage(0);
      setNav(true);
      slider.disabled = false;
    }
  }
  if (signal.aborted) return;
  pages = result;
  showPage(current);
}

function showPage(idx) {
  if (!pages.length) return;
  idx = Math.max(0, Math.min(pages.length - 1, idx));
  current = idx;
  const bmp = pages[idx];
  cv.width  = bmp.width;
  cv.height = bmp.height;
  ctx.drawImage(bmp, 0, 0);
  pgInfo.textContent = `${idx + 1} / ${pages.length}`;
  btnPrev.disabled   = idx === 0;
  btnNext.disabled   = idx === pages.length - 1;
}

function setNav(on) {
  btnPrev.disabled = !on;
  btnNext.disabled = !on;
  btnPlay.disabled = !on;
  if (!on) pgInfo.textContent = '— / —';
}

btnPrev.onclick = () => { stopPlay(); showPage(current - 1); };
btnNext.onclick = () => { stopPlay(); showPage(current + 1); };

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { stopPlay(); showPage(current - 1); }
  if (e.key === 'ArrowRight') { stopPlay(); showPage(current + 1); }
  if (e.key === ' ')          { e.preventDefault(); togglePlay(); }
});

function startPlay() {
  if (!pages.length) return;
  playing = true;
  btnPlay.textContent = '⏸ pause';
  btnPlay.classList.add('on');
  let last = 0;
  function tick(ts) {
    if (!playing) return;
    if (ts - last >= 1000 / parseInt(slider.value)) {
      last = ts;
      showPage(current >= pages.length - 1 ? 0 : current + 1);
    }
    playTimer = requestAnimationFrame(tick);
  }
  playTimer = requestAnimationFrame(tick);
}

function stopPlay() {
  playing = false;
  if (playTimer) { cancelAnimationFrame(playTimer); playTimer = null; }
  btnPlay.textContent = '▶ play';
  btnPlay.classList.remove('on');
}

function togglePlay() { playing ? stopPlay() : startPlay(); }
btnPlay.onclick = togglePlay;
</script>
</body>
</html>
