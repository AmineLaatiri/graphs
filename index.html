<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 12px; background: #fff; color: #000;
    height: 100vh; display: flex; flex-direction: row; overflow: hidden;
  }
  #sidebar {
    width: 150px; min-width: 100px; max-width: 50vw;
    border-right: 1px solid #ccc; display: flex; flex-direction: column;
    overflow: hidden; position: relative; flex-shrink: 0;
    background: #fafafa; transition: width .15s, min-width .15s;
  }
  #sidebar.resizing { transition: none; }
  #sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
  #sidebar.collapsed #resize-handle { display: none; }
  #resize-handle {
    position: absolute; top: 0; right: -3px;
    width: 6px; height: 100%; cursor: col-resize; z-index: 10;
  }
  #resize-handle:hover { background: rgba(0,0,0,.1); }
  #tree { flex: 1; overflow-y: auto; padding: 8px 0; }
  .folder { user-select: none; margin-bottom: 2px; }
  .folder-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 15px; cursor: pointer; font-weight: bold; color: #222;
  }
  .folder-row:hover { background: #eaeaea; }
  .folder-arrow {
    font-size: 9px; width: 10px; display: inline-block;
    transition: transform .15s ease; color: #666;
  }
  .folder.open > .folder-row .folder-arrow { transform: rotate(90deg); }
  .folder-children { display: none; padding-bottom: 5px; }
  .folder.open > .folder-children { display: block; }
  .file-row {
    padding: 4px 15px 4px 33px; cursor: pointer; color: #555;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-row:hover { background: #eaeaea; color: #000; }
  .file-row.active { background: #000; color: #fff; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  #stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; background: #e9e9e9;
  }
  video { max-width: 95%; max-height: 95%; display: none; background: #fff; box-shadow: 0px 5px 25px rgba(0,0,0,0.1); }
  #nav {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 15px; border-top: 1px solid #ccc; flex-shrink: 0; background: #fff;
  }
  button {
    font-size: 12px; font-weight: 500; border: 1px solid #bbb; border-radius: 3px;
    background: #fff; padding: 4px 10px; cursor: pointer; transition: all 0.1s;
  }
  button:hover:not(:disabled) { background: #f0f0f0; border-color: #888; }
  button:disabled { color: #ccc; border-color: #eee; cursor: not-allowed; }
  button.on { background: #000; color: #fff; border-color: #000; }
  #page-info { min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }
  #sep { color: #ccc; }
  input[type=range] { cursor: pointer; accent-color: #000; }
  #seek-bar { flex: 1; min-width: 100px; margin: 0 5px; }
  #speed-slider { width: 130px; }
  #speed-val { min-width: 30px; color: #444; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="tree"></div>
  <div id="resize-handle"></div>
</div>

<div id="main">
  <div id="stage">
    <video id="vid" playsinline muted loop></video>
  </div>
  <div id="nav">
    <button id="btn-tree">☰</button>
    <button id="btn-prev" disabled>&#8592;</button>
    <button id="btn-play" disabled>▶</button>
    <button id="btn-next" disabled>&#8594;</button>
    <span id="page-info">0.0 / 0.0</span>
    
    <input type="range" id="seek-bar" min="0" value="0" step="0.01" disabled>
    
    <span id="sep">|</span>
    <input type="range" id="speed-slider" min="0.1" max="16" step="0.1" value="16" disabled>
    <span id="speed-val">16.0x</span>
  </div>
</div>

<script>
const ALL_FILES = [
  "PTEST-1_LG_AS__implicit__N_60__eps_1e-01.mp4",
  "PTEST-1_LG_TW__implicit__N_60__eps_1e-01.mp4",
  "PTEST-1_LMG_AS__implicit__N_60__eps_1e-01.mp4",
  "PTEST-1_LMG_TW__implicit__N_60__eps_1e-01.mp4",
  "PTEST-1_LM_AS__implicit__N_60__eps_1e-01.mp4",
  "PTEST-1_LM_TW__implicit__N_60__eps_1e-01.mp4",
  "PTEST-1_MG_AS__implicit__N_60__eps_1e-01.mp4",
  "PTEST-1_MG_TW__implicit__N_60__eps_1e-01.mp4",
  
  "PTEST-3_LG_AS__implicit__N_60__eps_1e-03.mp4",
  "PTEST-3_LMG_AS__implicit__N_60__eps_1e-03.mp4",
  "PTEST-3_LMG_TW__implicit__N_60__eps_1e-03.mp4",
  "PTEST-3_MG_AS__implicit__N_60__eps_1e-03.mp4",
  "PTEST-3_MG_TW__implicit__N_60__eps_1e-03.mp4",
  
  "PTEST-4_LG_AS__implicit__N_60__eps_1e-04.mp4",
  "PTEST-4_LG_TW__implicit__N_60__eps_1e-04.mp4",
  "PTEST-4_LMG_AS__implicit__N_60__eps_1e-04.mp4",
  "PTEST-4_LMG_TW__implicit__N_60__eps_1e-04.mp4",
  "PTEST-4_LM_AS__implicit__N_60__eps_1e-04.mp4",
  "PTEST-4_LM_TW__implicit__N_60__eps_1e-04.mp4",
  "PTEST-4_MG_AS__implicit__N_60__eps_1e-04.mp4",
  "PTEST-4_MG_TW__implicit__N_60__eps_1e-04.mp4",
  
  "PTEST-5_LG_AS__implicit__N_60__eps_1e-05.mp4",
  "PTEST-5_LG_TW__implicit__N_60__eps_1e-05.mp4",
  "PTEST-5_LMG_AS__implicit__N_60__eps_1e-05.mp4",
  "PTEST-5_LMG_TW__implicit__N_60__eps_1e-05.mp4",
  "PTEST-5_LM_AS__implicit__N_60__eps_1e-05.mp4",
  "PTEST-5_LM_TW__implicit__N_60__eps_1e-05.mp4",
  "PTEST-5_MG_AS__implicit__N_60__eps_1e-05.mp4",
  "PTEST-5_MG_TW__implicit__N_60__eps_1e-05.mp4",
  
  "PTEST-8_LG_AS__implicit__N_60__eps_1e-08.mp4",
  "PTEST-8_LG_TW__implicit__N_60__eps_1e-08.mp4",
  "PTEST-8_LMG_AS__implicit__N_60__eps_1e-08.mp4",
  "PTEST-8_LMG_TW__implicit__N_60__eps_1e-08.mp4",
  "PTEST-8_LM_AS__implicit__N_60__eps_1e-08.mp4",
  "PTEST-8_LM_TW__implicit__N_60__eps_1e-08.mp4",
  "PTEST-8_MG_AS__implicit__N_60__eps_1e-08.mp4",
  "PTEST-8_MG_TW__implicit__N_60__eps_1e-08.mp4"
];

const sidebar = document.getElementById('sidebar');
document.getElementById('btn-tree').onclick = () => sidebar.classList.toggle('collapsed');

const resizeHandle = document.getElementById('resize-handle');
resizeHandle.addEventListener('mousedown', e => {
  e.preventDefault();
  sidebar.classList.add('resizing');
  const startX = e.clientX;
  const startW = sidebar.getBoundingClientRect().width;

  function onMove(ev) {
    sidebar.style.width = Math.max(100, Math.min(window.innerWidth * 0.5, startW + (ev.clientX - startX))) + 'px';
  }
  function onUp() {
    sidebar.classList.remove('resizing');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

const treeEl = document.getElementById('tree');
const vid = document.getElementById('vid');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnPlay = document.getElementById('btn-play');
const pgInfo  = document.getElementById('page-info');
const slider  = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-val');
const seekBar = document.getElementById('seek-bar');

function buildTree() {
  treeEl.innerHTML = '';
  const groupedFiles = {};
  
  ALL_FILES.forEach(filename => {
    const typeMatch = filename.match(/PTEST-\d+_(.*?)__implicit/);
    const folderName = typeMatch ? typeMatch[1].replace('_', ' ') : "other";
    
    if (!groupedFiles[folderName]) groupedFiles[folderName] = [];
    groupedFiles[folderName].push(filename);
  });

  function makeFileRow(filename) {
    const epsMatch = filename.match(/eps_1e-0?(\d+)/);
    const label = epsMatch ? `eps -${epsMatch[1]}` : filename;
    
    const fileRow = document.createElement('div');
    fileRow.className = 'file-row';
    fileRow.textContent = label;
    fileRow.onclick = () => {
      document.querySelectorAll('.file-row.active').forEach(r => r.classList.remove('active'));
      fileRow.classList.add('active');
      vid.style.display = 'block';
      vid.src = filename;
      vid.load();
      vid.playbackRate = parseFloat(slider.value);
      vid.play();
      btnPrev.disabled = btnNext.disabled = btnPlay.disabled = slider.disabled = seekBar.disabled = false;
      updatePlayButton();
    };
    return fileRow;
  }

  const sortedFolders = Object.keys(groupedFiles).sort();

  sortedFolders.forEach(folder => {
    const folderDiv = document.createElement('div');
    folderDiv.className = 'folder open';

    const row = document.createElement('div');
    row.className = 'folder-row';
    row.innerHTML = `<span class="folder-arrow">▶</span> ${folder}`;
    row.onclick = () => folderDiv.classList.toggle('open');

    const children = document.createElement('div');
    children.className = 'folder-children';

    groupedFiles[folder].sort((a, b) => {
       const numA = parseInt((a.match(/eps_1e-0?(\d+)/) || [])[1]) || 0;
       const numB = parseInt((b.match(/eps_1e-0?(\d+)/) || [])[1]) || 0;
       return numA - numB;
    }).forEach(filename => {
      children.appendChild(makeFileRow(filename));
    });

    folderDiv.appendChild(row);
    folderDiv.appendChild(children);
    treeEl.appendChild(folderDiv);
  });
}

buildTree();

slider.oninput = () => {
  const rate = parseFloat(slider.value);
  speedVal.textContent = rate.toFixed(1) + 'x';
  vid.playbackRate = rate;
};

let isDragging = false;
seekBar.addEventListener('mousedown', () => isDragging = true);
seekBar.addEventListener('mouseup', () => isDragging = false);
seekBar.addEventListener('input', () => {
  if (vid.duration) vid.currentTime = seekBar.value;
});

vid.addEventListener('timeupdate', () => {
  pgInfo.textContent = `${vid.currentTime.toFixed(1)} / ${(vid.duration || 0).toFixed(1)}`;
  if (!isDragging && vid.duration) {
    seekBar.max = vid.duration;
    seekBar.value = vid.currentTime;
  }
});

vid.addEventListener('loadedmetadata', () => {
  vid.playbackRate = parseFloat(slider.value);
});

vid.addEventListener('play', updatePlayButton);
vid.addEventListener('pause', updatePlayButton);

function updatePlayButton() {
  btnPlay.textContent = vid.paused ? '▶' : '⏸';
  vid.paused ? btnPlay.classList.remove('on') : btnPlay.classList.add('on');
}

btnPlay.onclick = () => { vid.paused ? vid.play() : vid.pause(); };
btnPrev.onclick = () => { vid.pause(); vid.currentTime = Math.max(0, vid.currentTime - 0.2); };
btnNext.onclick = () => { vid.pause(); vid.currentTime = Math.min(vid.duration, vid.currentTime + 0.2); };

document.addEventListener('keydown', e => {
  if (!vid.src) return;
  if (e.key === 'ArrowLeft')  { vid.pause(); vid.currentTime -= 0.2; }
  if (e.key === 'ArrowRight') { vid.pause(); vid.currentTime += 0.2; }
  if (e.key === ' ')          { e.preventDefault(); vid.paused ? vid.play() : vid.pause(); }
});
</script>
</body>
</html>
